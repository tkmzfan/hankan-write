<!doctype html>
<html lang="en" dir="ltr">
  <!--Run npx vite to test-->
  <head>
    <base href="%BASE_URL%">
    <meta name="darkreader-lock">
    <meta charset="UTF-8" />
    <title>HanKan Write</title>
    <script type="module" src="src/js/mainpage.js"></script>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
    <link rel="manifest" href="src/manifest.json" />
    <link rel="stylesheet" href="src/css/style.css" />
    <meta name="theme-color" content="#31d53d" />
  </head>
  <body>
    <script src="https://unpkg.com/hanzi-writer@latest/dist/hanzi-writer.js"></script>

    <!-- Settings Button -->
    <script type="module" src="src/js/settingsbar.js"></script>
    <script type="module" src="src/js/drag-resize-panel.js"></script>
    <div class="settings-container">
        <button class="settings-btn" id="settingsToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>

    <link rel="stylesheet" href="src/css/optionsbar.css" />
    <!-- Settings Sidebar -->
    <div class="settings-sidebar" id="settingsSidebar">
        <div class="sidebar-header">
            <h3>Settings</h3>
            <button class="close-btn" id="closeSettings">&times;</button>
        </div>
        <div class="sidebar-content">
            <div class="setting-group">
                <label for="themeSelect">Theme</label>
                <select id="themeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label for="languageSelect">Language</label>
                <select id="languageSelect">
                    <option value="jp">Japanese</option>
                    <option value="simp">Chinese (Simplified)</option>
                    <option value="trad">Chinese (Traditional)</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label for="fontSize">Font Size</label>
                <input type="range" id="fontSize" min="12" max="24" value="16">
            </div>
            
            <div class="setting-group">
                <label>
                    <input type="checkbox" id="showHints"> Show hints
                </label>
            </div>
            
            <div class="setting-group">
                <label>
                    <input type="checkbox" id="autoAdvance"> Auto-advance
                </label>
            </div>
            
            <div class="setting-group">
                <label>
                    <input type="checkbox" id="soundEffects" checked> Sound effects
                </label>
            </div>            
            <div class="setting-group">
                <h4>Cookie Management</h4>
                <button class="progress-btn delete-progress-btn" id="deleteProgress">Delete Progress</button>
            </div>
            
            <div class="setting-group">
                <button class="reset-btn" id="resetSettingsBtn">Reset to Defaults</button>
            </div>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>
    <script src="src/js/settingsbar.js"></script>

    <div id="info"> 
      <div id="jpinfo" hidden>
        <b>Kun: <span id="kun" style="font-weight: normal;"></span> On: <span id="on" style="font-weight: normal;"></span></b>
      </div>
      <div id="cninfo" hidden>
        <b>Pinyin: <span id="pinyin" style="font-weight: normal;"></span></b>
      </div>
      <div>
        <b>Meaning: <span id="meaning" style="font-weight: normal;"></span></b>
      </div>
    </div>

    <div class="main-content">
      <div id="target">
        <div id="overlay-container"> 
          <svg id="grid-background-target"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 100 100"
            width="450"
            height="450">
            <line x1="0" y1="0" x2="100" y2="100" stroke="#DDD" />
            <line x1="100" y1="0" x2="0" y2="100" stroke="#DDD" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="#DDD" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="#DDD" />
          </svg>
          
          <div id="writer-container" ></div> 
        </div>    
      </div>

      <div class="controls" id="controls">      
        <button id="back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.42-1.41L7.83 13H20v-2z"/>
          </svg>
          Back
        </button>
        <button id="hint">💡 Hint</button>      
        <button id="next">
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.42-1.41L16.17 13H4v-2z"/>
          </svg>
        </button>
      </div>

      <div id="desc"> 
        <p>Current index: #<span id="indexInfo" style="font-weight: bold;"></span></p>
        <p>Grade: <span id="grade"></span></p>
        <p>
          <span id="japanese-dictionaries" style="display: none;">
            <a href="#" id="jisho-link" target="_blank" rel="noopener noreferrer">Jisho</a> | 
            <a href="#" id="jpdb-link" target="_blank" rel="noopener noreferrer">jpdb</a>
          </span>
          <span id="chinese-dictionaries" style="display: none;">
            <a href="#" id="mdbg-link" target="_blank" rel="noopener noreferrer">MDBG</a> | 
            <a href="#" id="naver-link" target="_blank" rel="noopener noreferrer">Naver</a>
          </span>
        </p>
        <!--<p><span style="font-weight: bold;">Radicals </span>are colored <span style="color: red; font-weight: bold;">red.</span></p>  Will be added later to settings-->
      </div>
    </div>

    <div class="srs-stats">

    </div>

    <link rel="stylesheet" href="src/css/kanjigrid.css" />
    <!-- Character List Grid on Right -->
    <!-- Exercise Grid on Left -->
    <div class="exercise-box">
      <div class="exercise-grid-box" id="exerciseGridBox">
        <div class="exercise-header">
            <h3>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; opacity: 0.6;">
                    <circle cx="9" cy="12" r="1"></circle>
                    <circle cx="9" cy="5" r="1"></circle>
                    <circle cx="9" cy="19" r="1"></circle>
                    <circle cx="15" cy="12" r="1"></circle>
                    <circle cx="15" cy="5" r="1"></circle>
                    <circle cx="15" cy="19" r="1"></circle>
                </svg>
                Exercise Session
            </h3>
            <div class="exercise-controls">
                <select id="exerciseMode" class="mode-select">
                    <option value="normal">Normal Mode</option>
                    <option value="timed">Timed Mode</option>
                </select>
                <select id="gradeLevel" class="grade-select">
                    <option value="5">JLPT N5</option>
                    <option value="4">JLPT N4</option>
                    <option value="3">JLPT N3</option>
                    <option value="2">JLPT N2</option>
                    <option value="1">JLPT N1</option>
                </select>
                <input type="number" id="exerciseCount" min="5" max="50" value="10" class="count-input">
                <div class="timed-settings" id="timedSettings" style="display: none;">
                    <input type="number" id="timePerCharacter" min="3" max="30" value="5" class="time-input">
                    <span class="time-label">sec per char</span>
                </div>
                <button id="startExercise" class="start-btn">Start</button>
            </div>
            <div class="timer-display" id="timerDisplay" style="display: none;">
                <div class="timer-circle">
                    <svg class="timer-svg" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="none" stroke="#e9ecef" stroke-width="4"></circle>
                        <circle id="timerProgress" cx="20" cy="20" r="18" fill="none" stroke="#007bff" stroke-width="4" 
                                stroke-dasharray="113.1" stroke-dashoffset="113.1" stroke-linecap="round" 
                                transform="rotate(-90 20 20)"></circle>
                    </svg>
                    <span class="timer-text" id="timerText">5</span>
                </div>
            </div>
        </div>
        <div class="exercise-progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0/0</span>
        </div>
        <div class="exercise-grid" id="exercise-grid"></div>
      </div>
    </div>

    <link rel="stylesheet" href="src/css/kanjigrid.css" />
      <div class="grid-box" id="gridBox">
        <button class="grid-toggle" id="gridToggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15,18 9,12 15,6"></polyline>
          </svg>
        </button>
        <div class="grid-header">
            <h3>Character List</h3>
            <div class="grid-controls">
                <input type="text" placeholder="Search..." class="search-input">
            </div>
        </div>
        <div class="kanji-grid" id="kanji-grid"></div>
      </div>
    </div>

    <script src="src/js/cookie-popup.js" type="module"></script>

    </audio>
  </body>
</html>
