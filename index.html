<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta name="darkreader-lock">
    <meta charset="UTF-8" />
    <title>HanKan Write</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>
    <script type="module">
      import { Capacitor } from 'https://cdn.jsdelivr.net/npm/@capacitor/core@latest/dist/index.js';
      console.log(Capacitor.getPlatform());
    </script>

    <link rel="icon" type="image/x-icon" href=".public/assets/icon/favicon.ico" />
    <link rel="manifest" href="./src/manifest.json" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <meta name="theme-color" content="#31d53d" />

    <style>
    body {
      font-family: sans-serif;
      padding: 1rem;
      text-align: center;
    }
    #target {
      margin: 1rem auto;
      width: 300px;
      height: 300px;
      border: 1px solid #ccc;
      display: none;
    }
    #overlay-container {
      position: relative;
    }
    #grid-background-target,
    #writer-container {
      display: block;
      position: absolute;
      width: 300px;
      height: 300px;
    }
    .begin {
      margin-top: 2rem;
    }
    .controls {
      margin-top: 1rem;
    }
    input[type="text"] {
      padding: 0.5rem;
      font-size: 1.2rem;
      width: 4rem;
      text-align: center;
    }
    button {
      padding: 0.5rem 1rem;
      margin: 0 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
  </head>
  <body>
    <h1>HanKan Write</h1>

    <script src="https://unpkg.com/hanzi-writer@latest/dist/hanzi-writer.js"></script>

    <div class="begin" id="begin">
      <label for="lang">Select desired language:</label>
      <select name="lang" id="lang">
        <option value="jp">Japanese</option>
        <option value="trad">Traditional Chinese</option>
        <option value="simp">Simplified Chinese</option>
      </select>
      <button id="startQuiz" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div class="controls" id="controls" hidden>      
      <button id="back" onclick="next(0,-1,false)">Back</button>
      <button id="hint" onclick="hint()">Hint</button>      
      <button id="skip" onclick="next(0,1,false)">Skip</button>
    </div>

    <div id="info" hidden> 
      <div id="jpinfo" hidden>
        <b>Kun: <span id="kun" style="font-weight: normal;"></span> On: <span id="on" style="font-weight: normal;"></span></b>
      </div>
      <div id="cninfo" hidden>
        <b>Pinyin: <span id="pinyin" style="font-weight: normal;"></span></b>
      </div>
      <div>
        <b>Meaning: <span id="meaning" style="font-weight: normal;"></span></b>
      </div>
    </div>

    <div id="target">
      <div id="overlay-container"> 
        <svg id="grid-background-target"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 100 100"
          width="100"
          height="100">
          <line x1="0" y1="0" x2="100" y2="100" stroke="#DDD" />
          <line x1="100" y1="0" x2="0" y2="100" stroke="#DDD" />
          <line x1="50" y1="0" x2="50" y2="100" stroke="#DDD" />
          <line x1="0" y1="50" x2="100" y2="50" stroke="#DDD" />
        </svg>
        
        <div id="writer-container" ></div> 
      </div>    
    </div>
    
    <div id="desc" hidden> 
      <p>Try writing the character above!</p>
      <p>Current index: #<span id="indexInfo" style="font-weight: bold;"></span></p>
      <p>Grade: <span id="grade"></span></p>
      <!--<p><span style="font-weight: bold;">Radicals </span>are colored <span style="color: red; font-weight: bold;">red.</span></p>  Will be added later to settings-->
    </div>

    <div class="input" id="input" hidden>
      <laber for="skipto">Go to character or index:</p>
      <input type="text" id="skipto" name="skipto"><br><br>
      <input type="submit" value="Go" onclick="skipTo()">
    </div> 

    <script>
      const consent = localStorage.getItem("cookieConsent");
      if(consent == "accepted" && localStorage.getItem("currentIndex"))
        currentIndex = localStorage.getItem("currentIndex");

      var radicalColored = false;
      var currentStroke = 0;
      var currentIndex = 0; 

      var hanziList = null;
      var hanziData = null;

      var _targetLang = null;

      const targetWidth = 300;
      const targetHeight = 300;

      const svg = document.getElementById('grid-background-target');
      svg.setAttribute('width', targetWidth);
      svg.setAttribute('height', targetHeight);

      const target = document.getElementById('target');
      target.width = targetWidth;
      target.height = targetHeight;

      var writer = writer = HanziWriter.create("writer-container", "一", {
            width: targetWidth,
            height: targetHeight,
            showOutline: false,
            showCharacter: false,
            showHintAfterMisses: false,
            strokeColor: '#000',
            delayBetweenStrokes: 250,
            strokeAnimationSpeed: 0.75,
      });

      async function startQuiz() {
        target.style.display = 'block';
        document.getElementById('begin').hidden = true;
        document.getElementById('controls').hidden = false;
        document.getElementById('info').hidden = false;
        document.getElementById('desc').hidden = false;
        document.getElementById('input').hidden = false;

        //if(consent == "accepted" && localStorage.getItem("currentIndex"))
        //  currentIndex = localStorage.getItem("currentIndex");

        await setLang(document.getElementById("lang").value)
        console.log(hanziList[0]);
        setHanzi(hanziList[currentIndex]);
        
        writer.showOutline();

        if(radicalColored)
                writer.updateColor('radicalColor', '#D00')

        writer.animateCharacter({
          onComplete: function() {
            writer.updateColor('radicalColor', '#000')
            quizOn();
        }
      });
      }
      function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }
      function quizOn() {
        currentStroke = 0;
        writer.quiz({
            onComplete: function() {
              if(radicalColored)
                writer.updateColor('radicalColor', '#D00')

              next(2000,1,true)
            },
            onCorrectStroke: function(data) {
              currentStroke++;
            }
          })
      }
      async function next(delayTime, increment, done) {
        await delay(delayTime);
        Number(currentIndex) += Number(increment);
        setHanzi(hanziList[currentIndex]);
        quizOn();
      }
      function skipTo() {
        var input = document.getElementById("skipto").value;
        console.log(input);
        try {
          if(Number.isInteger(parseInt(input))) { // Go to index
          currentIndex = input;
          setHanzi(hanziList[input]);        
          }
          else {
            currentIndex = hanziList.indexOf(input);
            setHanzi(input) // Go directly to character       
          }
          quizOn();
        } catch (error) {
          console.log("Invalid input to skip")
        }
        
      }
      function hint() {
        writer.highlightStroke(currentStroke);
      }
      function setHanzi(hanzi) {
        writer.setCharacter(hanzi);
        if(consent == "accepted")
          localStorage.setItem("currentIndex", currentIndex);

        console.log(currentIndex);
        var currentHanziData = hanziData[currentIndex];

        switch(_targetLang) {
        case "jp":
          console.log(currentHanziData);
          document.getElementById('kun').textContent = currentHanziData.wk_readings_kun;
          document.getElementById('on').textContent = currentHanziData.wk_readings_on;
          document.getElementById('meaning').textContent = currentHanziData.wk_meanings;
          document.getElementById('grade').textContent = "JLPT N" + currentHanziData.jlpt_new;
          break;
        case "trad":
        case "simp":
          currentHanziData = hanziData[hanzi];
          console.log(currentHanziData);
          document.getElementById('pinyin').textContent = currentHanziData.pinyin;
          document.getElementById('meaning').textContent = currentHanziData.meaning;
          document.getElementById('grade').textContent = "HSK ";
          break;
        }
        document.getElementById("indexInfo").textContent = currentIndex;
      }
      function setLang(targetLang) {
        var orderList = null;
        var dictList = null;
        _targetLang = targetLang;
        switch(true) {
        case targetLang == "jp":
          if (Capacitor.isNativePlatform()){
            orderList = '/assets/lists/kanji-jouyou.json';
          }         
          else {
            orderList = 'dist/assets/lists/kanji-jouyou.json';
          }
          document.getElementById("jpinfo").hidden = false;
          document.getElementById("cninfo").hidden = true;
          return fetch(orderList)
            .then(response => response.json())
            .then(data => {
            hanziList = Object.keys(data);
            hanziData = Object.values(data);
            })
            .catch(error => console.error('Error:', error));         
        case targetLang == "trad":
        case targetLang == "simp":
          document.getElementById("jpinfo").hidden = true;
          document.getElementById("cninfo").hidden = false;
          if (Capacitor.isNativePlatform()){
            dictList = '/assets/lists/chinese_characters.json';
            orderList = targetLang == "simp" 
              ? '/assets/lists/simplified_chars_by_stroke.json'
              : '/assets/lists/traditional_chars_by_stroke.json';
          }
          else {
             dictList = 'dist/assets/lists/chinese_characters.json';
              orderList = targetLang == "simp" 
              ? 'dist/assets/lists/simplified_chars_by_stroke.json'
              : 'dist/assets/lists/traditional_chars_by_stroke.json';
          }
          
          break;
        }
        return Promise.all([
          fetch(dictList).then(response => response.json()),
          fetch(orderList).then(response => response.json())
        ]).then(([dictData, orderData]) => {
          hanziData = dictData;
          hanziList = orderData;
        }).catch(error => console.error('Error:', error));
      }
    </script>

    <script src="./src/cookie-popup.js" type="module"></script>
  </body>
</html>
