<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <base href="%BASE_URL%">
    <meta name="darkreader-lock">
    <meta charset="UTF-8" />
    <title>HanKan Write</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script>
      function startQuiz() {
        const lang = document.getElementById("lang").value;
        // Get the base path from the base element
        const baseHref = document.querySelector('base')?.href || '/';
        window.location.href = baseHref + 'main.html?lang=' + lang;
      }
    </script>

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
  </head>
  <body>
    <h1>HanKan Write</h1>

    <div class="begin" id="begin">
      <label for="lang">Select desired language:</label>
      <select name="lang" id="lang">
        <option value="jp">Japanese</option>
        <option value="trad">Traditional Chinese</option>
        <option value="simp">Simplified Chinese</option>
      </select>
      <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <script>
      import cookiePopup from './src/js/cookie-popup.js';
      if(Capacitor.getPlatform() === 'web')
        cookiePopup();
    </script>
  </body>
</html>
